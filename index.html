<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Sumit Art Digital Seva — CSC Kathlal</title>
<meta name="description" content="Sumit Art Digital Seva CSC Center Kathlal Gujarat - Government Services Chatbot"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0f;overflow:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(167,139,250,.3);border-radius:4px}

#app{
  display:flex;flex-direction:column;height:100vh;
  max-width:480px;margin:0 auto;
  background:#0a0a0f;position:relative;overflow:hidden;
  font-family:'Noto Sans Gujarati',sans-serif;
}

/* ORBs */
.orb{position:absolute;border-radius:50%;pointer-events:none;z-index:0}
.orb1{width:340px;height:340px;top:-90px;right:-90px;
  background:radial-gradient(circle,rgba(139,92,246,.2) 0%,transparent 70%);
  animation:float1 8s ease-in-out infinite}
.orb2{width:280px;height:280px;bottom:80px;left:-80px;
  background:radial-gradient(circle,rgba(59,130,246,.16) 0%,transparent 70%);
  animation:float2 10s ease-in-out infinite}
.orb3{width:200px;height:200px;top:40%;right:-50px;
  background:radial-gradient(circle,rgba(236,72,153,.12) 0%,transparent 70%);
  animation:float1 12s ease-in-out infinite reverse}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(16px)}}

/* HEADER */
#header{
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;position:relative;z-index:10;
  background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(59,130,246,.1));
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-bottom:1px solid rgba(167,139,250,.2);
}
.avatar{
  width:46px;height:46px;border-radius:16px;flex-shrink:0;
  background:linear-gradient(135deg,#7c3aed,#3b82f6);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 4px 20px rgba(124,58,237,.5);
  border:1px solid rgba(255,255,255,.15)
}
.brand{flex:1}
.brand-name{
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:.3px;
  background:linear-gradient(90deg,#c4b5fd,#93c5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.status{display:flex;align-items:center;gap:5px;margin-top:2px}
.dot-live{
  width:6px;height:6px;border-radius:50%;background:#4ade80;
  animation:pulse 2s infinite
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.status-txt{color:rgba(148,163,184,.7);font-size:11px}
.call-btn{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,rgba(74,222,128,.15),rgba(74,222,128,.05));
  border:1px solid rgba(74,222,128,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;text-decoration:none;flex-shrink:0
}

/* TABS */
#tabs{
  display:flex;padding:6px;margin:8px 10px 0;
  border-radius:16px;flex-shrink:0;gap:4px;position:relative;z-index:10;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
}
.tab{
  flex:1;padding:8px;border-radius:12px;font-size:12.5px;font-weight:600;
  font-family:'Noto Sans Gujarati',sans-serif;cursor:pointer;border:none;
  transition:all .25s ease;color:rgba(148,163,184,.7);background:transparent
}
.tab.active{
  background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;
  box-shadow:0 2px 12px rgba(124,58,237,.4)
}

/* CHAT */
#chat{
  flex:1;overflow-y:auto;padding:12px 10px 6px;
  position:relative;z-index:5;display:flex;flex-direction:column;gap:10px
}
.msg{display:flex;align-items:flex-end;gap:7px;animation:msgIn .3s cubic-bezier(.34,1.56,.64,1)}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.msg-avatar{
  width:30px;height:30px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px
}
.msg-avatar.bot{background:linear-gradient(135deg,#7c3aed,#3b82f6);box-shadow:0 2px 8px rgba(124,58,237,.4)}
.msg-avatar.user{background:linear-gradient(135deg,#3b82f6,#06b6d4)}
.bubble{
  max-width:76%;padding:10px 14px 7px;font-size:13px;line-height:1.7;
  color:rgba(226,232,240,.92)
}
.bubble.bot{
  background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px 16px 16px 4px;box-shadow:0 4px 15px rgba(0,0,0,.2)
}
.bubble.user{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);
  border-radius:16px 16px 4px 16px;box-shadow:0 4px 20px rgba(124,58,237,.35)
}
.bubble strong{color:#a78bfa}
.bubble.user strong{color:#e9d5ff}
.time{font-size:10px;margin-top:4px;text-align:right;color:rgba(148,163,184,.4)}
.bubble.user .time{color:rgba(255,255,255,.45)}

/* TYPING */
#typing{display:none;align-items:flex-end;gap:7px;padding:0 0 4px}
.typing-dots{
  background:rgba(255,255,255,.06);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px 16px 16px 4px;
  padding:12px 16px;display:flex;gap:5px;align-items:center
}
.td{
  width:7px;height:7px;border-radius:50%;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  animation:bounce 1.4s infinite ease-in-out
}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}

/* SERVICES */
#services{flex:1;overflow-y:auto;padding:10px;position:relative;z-index:5;display:none}
#cats{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;
  margin-bottom:10px;scrollbar-width:none
}
#cats::-webkit-scrollbar{display:none}
.cat{
  padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;
  font-family:'Noto Sans Gujarati',sans-serif;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(148,163,184,.7);cursor:pointer;white-space:nowrap;
  transition:all .2s ease
}
.cat.active{
  background:linear-gradient(135deg,#7c3aed,#3b82f6);border-color:transparent;
  color:#fff;box-shadow:0 2px 10px rgba(124,58,237,.4)
}
#svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.svc-card{
  border-radius:16px;
  background:rgba(255,255,255,.04);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  padding:12px 6px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;font-family:'Noto Sans Gujarati',sans-serif;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.svc-card:hover{transform:translateY(-3px) scale(1.04)}
.svc-card:active{transform:scale(.93)}
.svc-icon{font-size:26px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.svc-name{font-size:10.5px;font-weight:600;color:rgba(226,232,240,.85);line-height:1.3;text-align:center}
.svc-price{font-size:9.5px;color:rgba(167,139,250,.7);font-weight:500}
.vacancy-card{
  background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(245,158,11,.08)) !important;
  border:1px solid rgba(239,68,68,.3) !important;
  position:relative;overflow:hidden;
}
.vacancy-card::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(239,68,68,.05),transparent);
  pointer-events:none;
}
.live-badge{
  position:absolute;top:6px;right:6px;
  background:linear-gradient(135deg,#ef4444,#f59e0b);
  color:#fff;font-size:7px;font-weight:800;
  padding:2px 5px;border-radius:6px;letter-spacing:.5px;
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}

/* INPUT */
#input-bar{
  margin:6px 10px 8px;border-radius:20px;flex-shrink:0;
  padding:6px 6px 6px 16px;
  display:flex;align-items:center;gap:8px;
  position:relative;z-index:10;
  background:rgba(255,255,255,.04);backdrop-filter:blur(20px);
  border:1px solid rgba(167,139,250,.2);
  box-shadow:0 4px 24px rgba(0,0,0,.3)
}
#msg-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:13px;line-height:1.5;padding:6px 0;
  color:#e2e8f0;font-family:'Noto Sans Gujarati',sans-serif
}
#msg-input::placeholder{color:rgba(148,163,184,.5)}
#send-btn{
  width:42px;height:42px;border-radius:14px;flex-shrink:0;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;font-size:17px;
  cursor:pointer;border:none;color:#fff;
  transition:all .2s cubic-bezier(.34,1.56,.64,1)
}
#send-btn.active{
  background:linear-gradient(135deg,#7c3aed,#3b82f6);
  box-shadow:0 4px 16px rgba(124,58,237,.5)
}
#send-btn:hover{transform:scale(1.1)}
#send-btn:active{transform:scale(.9)}

/* FOOTER */
#footer{
  text-align:center;padding-bottom:8px;font-size:10px;flex-shrink:0;
  color:rgba(148,163,184,.25);position:relative;z-index:10
}
#footer span{color:rgba(167,139,250,.45)}
</style>
</head>

  {id:"forms",name:"Online Forms",icon:"📝",cat:"Gov",docs:["Form-wise Docs","Aadhaar","ફોટો"],price:"₹50–₹200",time:"1–3 દિવસ",note:"All Govt/Private Forms"},
  {id:"ojas",name:"Ojas / Vacancy",icon:"📢",cat:"Vacancy",docs:[],"price":"FREE Info",time:"Live",note:"Gujarat Govt + Central Govt Jobs",special:"vacancy"},

const CATS = ["બધા","ID","Gov","Banking","Finance","Travel","Utility","Revenue","Print","Business","Vacancy"];
let chatHistory = [];
let activeCat = "બધા";
let currentTab = "chat";

function fmt(t){
  return t.split("\n").map(line=>{
    const parts=line.split(/\*([^*]+)\*/g);
    return parts.map((p,i)=>i%2===1?`<strong>${p}</strong>`:p).join("")
  }).join("<br/>")
}

function now(){return new Date().toLocaleTimeString("gu-IN",{hour:"2-digit",minute:"2-digit"})}

function addMsg(type,text){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className=`msg ${type}`;
  const isUser=type==="user";
  div.innerHTML=`
    ${!isUser?`<div class="msg-avatar bot">🤖</div>`:""}
    <div class="bubble ${type}">
      ${fmt(text)}
      <div class="time">${now()}${isUser?" ✓✓":""}</div>
    </div>
    ${isUser?`<div class="msg-avatar user">🧑</div>`:""}
  `;
  chat.appendChild(div);
  div.scrollIntoView({behavior:"smooth"});
}

function showTyping(v){
  const t=document.getElementById("typing");
  t.style.display=v?"flex":"none";
  if(v) t.scrollIntoView({behavior:"smooth"});
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById("chat").style.display=tab==="chat"?"flex":"none";
  document.getElementById("services").style.display=tab==="services"?"block":"none";
  document.querySelectorAll(".tab").forEach((b,i)=>{
    b.classList.toggle("active",(tab==="chat"&&i===0)||(tab==="services"&&i===1))
  });
}

function renderCats(){
  const el=document.getElementById("cats");
  el.innerHTML=CATS.map(c=>`<button class="cat${c===activeCat?" active":""}" onclick="filterCat('${c}')">${c}</button>`).join("");
}

function filterCat(cat){
  activeCat=cat;
  renderCats();
  renderGrid();
}

function renderGrid(){
  const filtered=activeCat==="બધા"?SERVICES:SERVICES.filter(s=>s.cat===activeCat);
  document.getElementById("svc-grid").innerHTML=filtered.map(s=>`
    <div class="svc-card${s.special==="vacancy"?" vacancy-card":""}" onclick="selectSvc('${s.id}')">
      <span class="svc-icon">${s.icon}</span>
      <span class="svc-name">${s.name}</span>
      <span class="svc-price">${s.special==="vacancy"?"🔴 Live":s.price.split("–")[0].split("·")[0]+"~"}</span>
      ${s.special==="vacancy"?`<span class="live-badge">LIVE</span>`:""}
    </div>
  `).join("");
}

function selectSvc(id){
  const s=SERVICES.find(x=>x.id===id);
  if(!s)return;
  switchTab("chat");

  // Special: Ojas/Vacancy — Live AI web search
  if(s.special==="vacancy"){
    addMsg("user","📢 Ojas / Government Vacancy — હાલની ભરતી માહિતી");
    chatHistory.push({role:"user",content:"Ojas portal અને Gujarat/Central Government ની હાલની ભરતી (vacancy) ની તાજી માહિતી Gujarati માં આપો. Latest jobs, last date, posts, qualification."});
    showTyping(true);
    fetchVacancy();
    return;
  }

  addMsg("user",`${s.icon} ${s.name} — Documents & Fees`);
  chatHistory.push({role:"user",content:`${s.icon} ${s.name} - Documents and Fees`});
  showTyping(true);
  setTimeout(()=>{
    showTyping(false);
    const reply=`${s.icon} *${s.name}*\n\n📋 *જરૂરી Documents:*\n${s.docs.map(d=>"• "+d).join("\n")}\n\n💰 *Fees:* ${s.price}\n⏱️ *સમય:* ${s.time}\n📌 *નોંધ:* ${s.note}\n\n📞 *8866767269* — Call / WhatsApp`;
    addMsg("bot",reply);
    chatHistory.push({role:"assistant",content:reply});
  },800);
}

async function fetchVacancy(){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:2000,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        system:`You are a job vacancy assistant for SUMIT ART DIGITAL SEVA CSC Center, Kathlal, Gujarat.
Search for the latest Gujarat government job vacancies from Ojas portal (ojas.gujarat.gov.in) and other govt sites.
Reply ONLY in Gujarati. Format nicely with:
- Job name/post
- Department  
- Total posts
- Qualification
- Last date
- How to apply (ojas.gujarat.gov.in link)
Mention: "Form ભરવા માટે Sumit Art Digital Seva સંપર્ક કરો: 8866767269" at end.`,
        messages:[{role:"user",content:"Gujarat Ojas portal અને central government ની latest 5-6 ભરતી (vacancy 2025) ની માહિતી આપો. Last date, posts, qualification સહિત."}],
      })
    });
    const data=await res.json();
    showTyping(false);
    // Extract text from response (may have tool_use blocks)
    let reply="";
    if(data.content){
      for(const block of data.content){
        if(block.type==="text") reply+=block.text;
      }
    }
    if(!reply) reply="⚠️ હાલ vacancy info મળી નથી. *8866767269* Call કરો.";
    addMsg("bot",reply);
    chatHistory.push({role:"assistant",content:reply});
  }catch{
    showTyping(false);
    addMsg("bot","⚠️ Network Error — *8866767269* Call કરો.");
  }
}

async function sendMsg(){
  const inp=document.getElementById("msg-input");
  const q=inp.value.trim();
  if(!q)return;
  inp.value="";
  updateSendBtn("");
  addMsg("user",q);
  chatHistory.push({role:"user",content:q});
  showTyping(true);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:`You are AI assistant for "SUMIT ART DIGITAL SEVA" CSC Center in Kathlal, Gujarat.
Owner: Sumit B. Suthar | Phone: 8866767269
Address: Ubhiya Mata Mandir Pase, Kathlal Bazar Road, Ta.Kathlal, Ji.Kheda-387630 (Gujarat)
Hours: Mon–Sat 10AM–6PM
Services: Aadhaar update, PAN Card, Voter ID, Driving License, Ayushman Card, E-Shram, FASTag, Passport, Train/Bus/Flight Ticket, IT Return, LIC Premium, Money Transfer, Light Bill, 7/12 Satbara, Xerox/Print, Photo/Lamination, MSME Udham, Kisan Credit Card, NPS, Insurance, RTO Forms, PM Svanidhi, Online Forms, Ojas/Government Vacancy Form Filling.
For vacancy/job/Ojas questions: Provide Gujarat govt job info from ojas.gujarat.gov.in and central govt jobs.
CRITICAL RULE: Reply ONLY in Gujarati language. Be friendly, helpful, concise. Always mention contact 8866767269 at the end of reply.`,
        messages:chatHistory,
      })
    });
    const data=await res.json();
    showTyping(false);
    const reply=data.content?.[0]?.text??"⚠️ ફરી પ્રયત્ન કરો.";
    addMsg("bot",reply);
    chatHistory.push({role:"assistant",content:reply});
  }catch{
    showTyping(false);
    addMsg("bot","⚠️ Network Error — *8866767269* Call કરો.");
  }
}

function updateSendBtn(val){
  const btn=document.getElementById("send-btn");
  if(val.trim()){btn.classList.add("active");btn.textContent="➤"}
  else{btn.classList.remove("active");btn.textContent="🎙️"}
}

document.getElementById("msg-input").addEventListener("input",e=>updateSendBtn(e.target.value));
document.getElementById("msg-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg()}
});

// INIT
renderCats();
renderGrid();
switchTab("chat");
addMsg("bot","🙏 *નમસ્કાર!*\n\nSUMIT ART DIGITAL SEVAમાં આપનું સ્વાગત!\n\n*24 સરકારી સેવાઓ* ઉપલબ્ધ.\n\n📢 *નવું!* Ojas + Govt Vacancy Live Info — Services tab માં જુઓ!\n\n👇 *Services* tab tap કરો — Documents + Fees + Jobs\nઅથવા *Gujarati સવાલ* ટાઈપ કરો! 😊");
</script>
